<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>잉글랩 — 학생 배정 관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
           background: #F1F5F9; color: #1E293B; min-height: 100vh; }

    /* ── LOGIN ─────────────────────────────── */
    #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
    .login-card { background:#fff; border-radius:20px; padding:44px 36px; width:100%; max-width:400px;
                  box-shadow:0 8px 40px rgba(0,0,0,.12); text-align:center; }
    .login-logo { font-size:44px; margin-bottom:10px; }
    .login-card h1 { font-size:20px; font-weight:800; margin-bottom:4px; }
    .login-card p  { font-size:13px; color:#94A3B8; margin-bottom:28px; }
    .form-group { text-align:left; margin-bottom:14px; }
    .form-group label { display:block; font-size:13px; font-weight:600; color:#475569; margin-bottom:6px; }
    .form-group select, .form-group input {
      width:100%; padding:12px 14px; border:2px solid #E2E8F0; border-radius:10px;
      font-size:15px; outline:none; transition:border-color .2s; background:#fff; }
    .form-group select:focus, .form-group input:focus { border-color:#6366F1; }
    .btn-primary { width:100%; padding:13px; background:linear-gradient(135deg,#6366F1,#8B5CF6);
                   color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:700;
                   cursor:pointer; transition:opacity .2s; margin-top:8px; }
    .btn-primary:hover { opacity:.9; }
    .error-msg { color:#EF4444; font-size:13px; margin-top:10px; min-height:20px; }

    /* ── APP SHELL ─────────────────────────── */
    #app-screen { display:none; flex-direction:column; min-height:100vh; }
    header { background:linear-gradient(135deg,#4F46E5,#7C3AED); color:#fff;
             padding:14px 24px; display:flex; align-items:center; justify-content:space-between;
             flex-wrap:wrap; gap:10px; }
    header .hd-left h1 { font-size:17px; font-weight:800; }
    header .hd-left p  { font-size:12px; color:#C7D2FE; margin-top:2px; }
    .btn-logout { background:rgba(255,255,255,.15); color:#fff; border:1px solid rgba(255,255,255,.3);
                  border-radius:8px; padding:7px 16px; font-size:13px; cursor:pointer; }
    .btn-logout:hover { background:rgba(255,255,255,.25); }

    /* ── TABS ──────────────────────────────── */
    .tab-bar { background:#fff; border-bottom:2px solid #E2E8F0;
               display:flex; padding:0 24px; gap:4px; overflow-x:auto; }
    .tab-btn { padding:14px 20px; border:none; background:none; font-size:14px; font-weight:600;
               color:#64748B; cursor:pointer; border-bottom:3px solid transparent;
               margin-bottom:-2px; transition:all .2s; white-space:nowrap; }
    .tab-btn.active { color:#4F46E5; border-bottom-color:#4F46E5; }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }

    /* ── CONTENT ────────────────────────────── */
    .content { padding:24px; max-width:900px; margin:0 auto; }
    .section-title { font-size:16px; font-weight:700; color:#1E293B; margin-bottom:16px;
                     padding-bottom:10px; border-bottom:2px solid #E2E8F0; }

    /* ── ADD FORM ───────────────────────────── */
    .add-form { background:#fff; border-radius:14px; padding:20px 24px;
                box-shadow:0 1px 6px rgba(0,0,0,.06); margin-bottom:20px; }
    .add-form h3 { font-size:14px; font-weight:700; color:#475569; margin-bottom:14px; }
    .form-row { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; }
    .form-row .form-group { flex:1; min-width:160px; margin-bottom:0; }
    .form-row .form-group label { font-size:12px; color:#64748B; }
    .form-row .form-group input { padding:10px 12px; font-size:14px; }
    .btn-add { padding:10px 20px; background:#4F46E5; color:#fff; border:none; border-radius:8px;
               font-size:14px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .btn-add:hover { background:#4338CA; }
    .form-hint { font-size:12px; color:#EF4444; margin-top:6px; display:none; }

    /* ── TABLE ──────────────────────────────── */
    .table-wrap { background:#fff; border-radius:14px; overflow:hidden;
                  box-shadow:0 1px 6px rgba(0,0,0,.06); }
    table { width:100%; border-collapse:collapse; font-size:14px; }
    thead { background:#F8FAFC; }
    th { padding:12px 16px; text-align:left; font-size:12px; font-weight:700;
         color:#64748B; border-bottom:1px solid #E2E8F0; white-space:nowrap; }
    td { padding:12px 16px; border-bottom:1px solid #F1F5F9; }
    tr:last-child td { border-bottom:none; }
    .empty-row td { text-align:center; color:#94A3B8; padding:40px; }

    /* ── STATUS PILLS ───────────────────────── */
    .pill { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
    .pill-assigned    { background:#EEF2FF; color:#4338CA; }
    .pill-in_progress { background:#FEF3C7; color:#92400E; }
    .pill-done        { background:#DCFCE7; color:#166534; }

    .code-badge { font-family:monospace; font-size:14px; font-weight:700; color:#1E293B;
                  background:#F1F5F9; padding:4px 10px; border-radius:6px;
                  cursor:pointer; border:1px solid #E2E8F0; }
    .code-badge:hover { background:#E2E8F0; }

    .btn-sm { padding:5px 12px; border-radius:6px; font-size:12px; font-weight:600;
              cursor:pointer; border:none; }
    .btn-danger  { background:#FEE2E2; color:#991B1B; }
    .btn-danger:hover  { background:#FECACA; }
    .btn-assign  { background:#EEF2FF; color:#4338CA; }
    .btn-assign:hover  { background:#E0E7FF; }
    .btn-report  { background:#F0FDF4; color:#166534; }
    .btn-report:hover  { background:#DCFCE7; }

    /* ── REPORT MODAL ───────────────────────────── */
    .report-modal { background:#fff; border-radius:20px; padding:28px; width:100%;
                    max-width:700px; max-height:88vh; overflow-y:auto;
                    box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .report-modal h2 { font-size:17px; font-weight:800; margin-bottom:4px; }
    .report-modal .r-meta { font-size:13px; color:#64748B; margin-bottom:20px; }
    .r-score-box { background:#F1F5F9; border-radius:12px; padding:18px; text-align:center; margin-bottom:16px; }
    .r-score-num { font-size:52px; font-weight:800; color:#4F46E5; line-height:1; }
    .r-score-sub { font-size:13px; color:#64748B; margin-top:6px; }
    .r-level-box { background:#F0FDF4; border-left:4px solid #22C55E; border-radius:0 10px 10px 0;
                   padding:12px 16px; margin-bottom:10px; }
    .r-level-box .r-label { font-size:11px; font-weight:700; color:#166534; text-transform:uppercase; margin-bottom:4px; }
    .r-level-box .r-val   { font-size:15px; font-weight:700; color:#15803D; }
    .r-diag-box  { background:#F8FAFC; border-left:4px solid #94A3B8; border-radius:0 10px 10px 0;
                   padding:12px 16px; margin-bottom:16px; font-size:13px; color:#475569; line-height:1.7; }
    /* r-challenge-box removed */
    .r-sec-title { font-size:11px; font-weight:700; color:#64748B; text-transform:uppercase;
                   letter-spacing:.5px; margin:14px 0 8px; }
    .r-sec-bar   { display:flex; align-items:center; gap:10px; margin:6px 0; }
    .r-sec-name  { width:36px; font-size:13px; color:#64748B; flex-shrink:0; }
    .r-sec-track { flex:1; height:8px; background:#E2E8F0; border-radius:4px; overflow:hidden; }
    .r-sec-fill  { height:100%; background:linear-gradient(90deg,#4F46E5,#7C3AED); border-radius:4px; }
    .r-sec-val   { width:70px; font-size:12px; font-weight:700; text-align:right; flex-shrink:0; color:#1E293B; }
    .r-sec-comment { font-size:11px; color:#64748B; margin:-2px 0 6px 46px; line-height:1.5; }
    .spk-ref-line { font-size:11px; color:#94A3B8; margin:0 0 10px; }
    .spk-fb-item { display:flex; gap:8px; align-items:flex-start; margin:8px 0; }
    .spk-fb-lbl { font-size:11px; font-weight:700; color:#4F46E5; min-width:40px; flex-shrink:0;
                  background:#EEF2FF; border-radius:4px; padding:2px 7px; text-align:center; line-height:1.8; }
    .spk-fb-txt { font-size:13px; color:#374151; line-height:1.65; }
    .r-placeholder { background:#F8FAFC; border:2px dashed #E2E8F0; border-radius:10px;
                     padding:16px; text-align:center; color:#94A3B8; font-size:13px; margin-bottom:10px; }
    .r-placeholder .r-ph-label { font-size:11px; font-weight:700; text-transform:uppercase;
                                  letter-spacing:.5px; color:#CBD5E1; margin-bottom:6px; }
    .r-section-divider { height:1px; background:#E2E8F0; margin:18px 0; }
    .r-bonus-badge { background:#FEF3C7; color:#92400E; border-radius:20px; padding:3px 12px;
                     font-size:12px; font-weight:700; display:inline-block; margin-top:4px; }
    /* ── 진단 리포트 공통 스타일 (test.html 기준 통일) ── */
    .ai-badge { display:inline-block; background:linear-gradient(135deg,#4F46E5,#7C3AED);
                color:#fff; font-size:11px; font-weight:700; border-radius:20px;
                padding:4px 14px; letter-spacing:.5px; }
    .ai-section-title { font-size:11px; font-weight:700; color:#4F46E5; text-transform:uppercase;
                        letter-spacing:.5px; margin:14px 0 8px; }
    .result-level-box { background:#EEF2FF; border-radius:12px; padding:14px 16px; margin:12px 0; }
    .result-level-box .rl-label { font-size:11px; color:#6366F1; font-weight:700; margin-bottom:4px; }
    .result-level-box .rl-value { font-size:18px; font-weight:800; color:#4F46E5; }
    .diag-text { font-size:13px; color:#475569; line-height:1.7; background:#F8FAFC;
                 padding:14px 16px; border-radius:10px; margin-top:4px; }
    .overall-box { background:#EEF2FF; border-left:3px solid #4F46E5;
                   border-radius:0 10px 10px 0; padding:12px 16px; font-size:13px;
                   color:#3730A3; line-height:1.75; margin:12px 0 4px; }
    .overall-box .overall-lbl { font-size:10px; font-weight:700; text-transform:uppercase;
                                 letter-spacing:.5px; color:#4F46E5; margin-bottom:4px; }
    .radar-wrap { text-align:center; margin:6px 0 4px; }
    .sec-detail-item { margin:6px 0 12px; }
    .sec-detail-name { font-size:12px; font-weight:700; color:#374151; }
    .sec-detail-pct  { font-size:12px; color:#4F46E5; font-weight:700; margin-left:6px; }
    .bonus-badge { background:#FEF3C7; color:#92400E; border-radius:20px; padding:4px 14px;
                   font-size:12px; font-weight:700; display:inline-block; }
    .res-hdr { display:flex; flex-wrap:wrap; gap:4px 16px; padding:10px 14px;
               background:#F8FAFC; border-radius:10px; margin-bottom:14px;
               font-size:12px; color:#64748B; line-height:1.7; }
    .res-hdr strong { color:#1E293B; font-weight:700; }
    .print-btn-diag { display:block; width:100%; padding:11px; background:#F1F5F9;
                      border:none; border-radius:10px; font-size:14px; font-weight:700;
                      cursor:pointer; color:#475569; margin-top:14px; }
    .print-btn-diag:hover { background:#E2E8F0; }
    .diag-grid { display:block; }
    /* ── 출력 (A4) ── */
    @media print {
      @page { size: A4 portrait; margin: 12mm 14mm; }
      body > *:not(#report-modal) { display:none !important; }
      #report-modal { position:static !important; display:flex !important;
                      background:transparent !important; padding:0 !important; }
      .report-modal { box-shadow:none !important; border-radius:0 !important;
                      max-height:none !important; overflow:visible !important;
                      max-width:none !important; width:100% !important; padding:8px !important; }
      .print-btn-diag, .btn-cancel { display:none !important; }
      .ai-badge, .overall-box, .result-level-box, .res-hdr, .ai-section-title,
      .bonus-badge, .r-sec-fill, .spk-fb-lbl { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .radar-wrap svg { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      .diag-grid { display:grid !important; grid-template-columns:1fr 1fr !important;
                   gap:0 20px !important; align-items:start !important; }
      .overall-box, .result-level-box { page-break-inside:avoid; }
    }

    /* ── STAGE ASSIGN MODAL ─────────────────── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4);
                     display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff; border-radius:20px; padding:32px; width:100%; max-width:500px;
             box-shadow:0 20px 60px rgba(0,0,0,.2); }
    .modal h2 { font-size:18px; font-weight:800; margin-bottom:6px; }
    .modal .modal-sub { font-size:13px; color:#64748B; margin-bottom:24px; }
    .stage-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:24px; }
    .stage-card { border:2px solid #E2E8F0; border-radius:12px; padding:14px 16px;
                  cursor:pointer; transition:all .18s; background:#fff; text-align:left; }
    .stage-card:hover:not(.disabled) { border-color:#6366F1; background:#F5F3FF; }
    .stage-card.selected { border-color:#4F46E5; background:#EEF2FF; }
    .stage-card.disabled { cursor:not-allowed; opacity:.45; background:#F8FAFC; }
    .stage-card .stage-header { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
    .stage-num { width:28px; height:28px; background:#E0E7FF; color:#3730A3; border-radius:8px;
                 font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .stage-card.selected .stage-num { background:#4F46E5; color:#fff; }
    .stage-name { font-weight:700; font-size:15px; }
    .stage-inactive-badge { font-size:11px; font-weight:600; color:#94A3B8; margin-left:auto;
                            background:#F1F5F9; padding:2px 8px; border-radius:20px; }
    .stage-guide { font-size:13px; color:#64748B; line-height:1.5; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; }
    .btn-cancel { padding:10px 20px; background:#F1F5F9; color:#475569; border:none;
                  border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-cancel:hover { background:#E2E8F0; }
    .btn-confirm { padding:10px 24px; background:#4F46E5; color:#fff; border:none;
                   border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; }
    .btn-confirm:hover { background:#4338CA; }
    .btn-confirm:disabled { opacity:.4; cursor:not-allowed; }

    /* ── TOAST ──────────────────────────────── */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
             background:#1E293B; color:#fff; padding:12px 22px; border-radius:12px; font-size:14px;
             font-weight:600; opacity:0; transition:all .3s; z-index:200; white-space:nowrap; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🏫</div>
    <h1>잉글랩 학생 배정</h1>
    <p>원장 로그인 후 학생을 관리하세요</p>
    <div class="form-group">
      <label>학원 선택</label>
      <select id="academy-select"><option value="">학원을 선택하세요</option></select>
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">로그인</button>
    <p class="error-msg" id="login-error"></p>
  </div>
</div>

<!-- 앱 화면 -->
<div id="app-screen">
  <header>
    <div class="hd-left">
      <h1>🏫 잉글랩 배정 관리</h1>
      <p id="hd-academy-name">학원명</p>
    </div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('students')">학생 관리</button>
    <button class="tab-btn"        onclick="switchTab('assignments')">배정 현황</button>
  </div>

  <!-- 학생 관리 탭 -->
  <div id="tab-students" class="tab-pane active">
    <div class="content">
      <div class="add-form">
        <h3>+ 학생 추가</h3>
        <div class="form-row">
          <div class="form-group">
            <label>이름</label>
            <input type="text" id="new-name" placeholder="홍길동">
          </div>
          <div class="form-group">
            <label>이메일 <span style="color:#EF4444;">*필수</span></label>
            <input type="email" id="new-email" placeholder="student@example.com">
          </div>
          <button class="btn-add" onclick="addStudent()">추가</button>
        </div>
        <p class="form-hint" id="student-add-error"></p>
      </div>
      <div class="section-title">학생 목록</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>이름</th><th>이메일</th><th>등록일</th><th>배정</th><th></th>
            </tr>
          </thead>
          <tbody id="students-tbody">
            <tr class="empty-row"><td colspan="5">로딩 중…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 배정 현황 탭 -->
  <div id="tab-assignments" class="tab-pane">
    <div class="content">
      <div class="section-title">배정 현황</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>학생</th><th>단계</th><th>상태</th><th>접근 코드</th><th>배정일</th><th>리포트</th>
            </tr>
          </thead>
          <tbody id="assignments-tbody">
            <tr class="empty-row"><td colspan="6">로딩 중…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- 단계 배정 모달 -->
<div class="modal-overlay" id="assign-modal">
  <div class="modal">
    <h2>📋 단계 배정</h2>
    <p class="modal-sub" id="assign-modal-sub">학생 이름</p>
    <div class="stage-grid" id="stage-grid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-confirm" id="btn-confirm-assign" onclick="confirmAssign()" disabled>배정 확정</button>
    </div>
  </div>
</div>

<!-- 리포트 모달 -->
<div class="modal-overlay" id="report-modal">
  <div class="report-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
      <h2 id="report-title">📊 시험 리포트</h2>
      <button class="btn-cancel" onclick="closeReportModal()" style="width:auto;padding:6px 16px;">닫기</button>
    </div>
    <p class="r-meta" id="report-meta">—</p>
    <div id="report-body">로딩 중…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/speaking-utils.js"></script>
<script>
'use strict';
let _token = null;
let _academyId = null;
let _academyName = '';
let _selectedStage = null;
let _modalStudent = null; // { id, name, email }

// ── 학원 목록 로드 ────────────────────────────────────────────────────────
(async () => {
  try {
    const pubRes = await fetch('/api/academies').then(r => r.json());
    const sel = document.getElementById('academy-select');
    (Array.isArray(pubRes) ? pubRes : []).forEach(ac => {
      const opt = document.createElement('option');
      opt.value = ac.id; opt.textContent = ac.name;
      sel.appendChild(opt);
    });
  } catch(e) { console.warn('학원 목록 로드 실패', e); }
})();

// ── 로그인 ────────────────────────────────────────────────────────────────
async function doLogin() {
  const academyId = document.getElementById('academy-select').value;
  const password  = document.getElementById('login-pw').value;
  const errEl     = document.getElementById('login-error');
  errEl.textContent = '';

  if (!academyId) { errEl.textContent = '학원을 선택해주세요.'; return; }
  if (!password)  { errEl.textContent = '비밀번호를 입력해주세요.'; return; }

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ academyId, password }),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.error || '로그인 실패'; return; }

    _token      = data.token;
    _academyId  = data.academy.id;
    _academyName = data.academy.name;
    sessionStorage.setItem('assign_token', _token);
    sessionStorage.setItem('assign_academy', JSON.stringify(data.academy));

    document.getElementById('hd-academy-name').textContent = _academyName;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    loadStudents();
  } catch (e) {
    errEl.textContent = '서버 오류가 발생했습니다.';
  }
}

});

function doLogout() {

  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pw').value = '';
}

(() => {

// ── 탭 전환 ───────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['students','assignments'][i] === name));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'students')    loadStudents();
  if (name === 'assignments') loadAssignments();
}

// ── 학생 목록 ─────────────────────────────────────────────────────────────
async function loadStudents() {
  const tbody = document.getElementById('students-tbody');
  try {
    const list = await authedGet('/api/admin/students');
    if (!list.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="5">등록된 학생이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(s => `
      <tr>
        <td><strong>${esc(s.name)}</strong></td>
        <td style="color:#64748B;">${esc(s.email)}</td>
        <td style="color:#94A3B8;font-size:12px;">${new Date(s.createdAt).toLocaleDateString('ko-KR')}</td>
        <td><button class="btn-sm btn-assign" onclick='openAssignModal(${JSON.stringify({id:s.id,name:s.name,email:s.email})})'>단계 배정</button></td>
        <td><button class="btn-sm btn-danger" onclick="deleteStudent(${s.id})">삭제</button></td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">불러오기 실패</td></tr>';
  }
}

async function addStudent() {
  const name   = document.getElementById('new-name').value.trim();
  const email  = document.getElementById('new-email').value.trim();
  const errEl  = document.getElementById('student-add-error');
  errEl.style.display = 'none';

  if (!name || !email) {
    errEl.textContent = '이름과 이메일을 모두 입력해주세요.';
    errEl.style.display = 'block'; return;
  }

  try {
    await authedPost('/api/admin/students', { name, email });
    document.getElementById('new-name').value  = '';
    document.getElementById('new-email').value = '';
    showToast('학생이 추가되었습니다.');
    loadStudents();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

async function deleteStudent(id) {
  if (!confirm('이 학생을 삭제하시겠습니까?')) return;
  try {
    await authedDel('/api/admin/students/' + id);
    showToast('삭제되었습니다.');
    loadStudents();
  } catch(e) { alert(e.message); }
}

// ── 배정 현황 ─────────────────────────────────────────────────────────────
async function loadAssignments() {
  const tbody = document.getElementById('assignments-tbody');
  try {
    const list = await authedGet('/api/admin/assignments');
    if (!list.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">배정 내역이 없습니다.</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(a => `
      <tr>

        <td><strong>단계 ${a.stage}</strong> ${esc(a.stageName)}</td>
        <td><span class="pill pill-${a.status}">${statusLabel(a.status)}</span></td>
        <td>
          <span class="code-badge" title="클릭하면 복사됩니다" onclick="copyCode('${esc(a.accessCode)}')">${esc(a.accessCode)}</span>
          <br><a href="/test?code=${esc(a.accessCode)}" target="_blank" style="font-size:11px;color:#6366F1;margin-top:4px;display:inline-block;">시험 링크 ↗</a>

function statusLabel(s) {
  return { assigned:'대기', in_progress:'진행 중', done:'완료' }[s] || s;
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast('코드가 복사되었습니다: ' + code));
}

// ── 단계 배정 모달 ────────────────────────────────────────────────────────
let _stageGuide = null;

async function openAssignModal(student) {
  _modalStudent = student;
  _selectedStage = null;
  document.getElementById('assign-modal-sub').textContent = student.name + ' 학생의 단계를 선택하세요';
  document.getElementById('btn-confirm-assign').disabled = true;

  if (!_stageGuide) {
    _stageGuide = await fetch('/api/stage-guide').then(r => r.json());
  }
  const grid = document.getElementById('stage-grid');
  grid.innerHTML = Object.entries(_stageGuide).map(([num, g]) => `
    <button class="stage-card${g.active ? '' : ' disabled'}" data-stage="${num}"
      ${g.active ? `onclick="selectStage(${num})"` : 'disabled'}>
      <div class="stage-header">
        <div class="stage-num">${num}</div>
        <span class="stage-name">${g.label}</span>
        ${!g.active ? '<span class="stage-inactive-badge">비활성</span>' : ''}
      </div>
      <div class="stage-guide">${g.guide}</div>
    </button>`).join('');

  document.getElementById('assign-modal').classList.add('open');
}

function selectStage(num) {
  _selectedStage = num;
  document.querySelectorAll('.stage-card').forEach(c =>
    c.classList.toggle('selected', parseInt(c.dataset.stage) === num));
  document.getElementById('btn-confirm-assign').disabled = false;
}

function closeModal() {
  document.getElementById('assign-modal').classList.remove('open');
  _modalStudent = null; _selectedStage = null;
}

async function confirmAssign() {
  if (!_modalStudent || !_selectedStage) return;
  document.getElementById('btn-confirm-assign').disabled = true;
  try {
    const res = await authedPost('/api/admin/assignments', {
      studentId:    _modalStudent.id,
      studentName:  _modalStudent.name,
      studentEmail: _modalStudent.email,
      stage:        _selectedStage,
    });
    closeModal();
    showToast('배정 완료! 코드: ' + res.accessCode);
    switchTab('assignments');
  } catch(e) {
    alert('배정 실패: ' + e.message);
    document.getElementById('btn-confirm-assign').disabled = false;
  }
}

// ── API 헬퍼 ──────────────────────────────────────────────────────────────
async function authedGet(url) {
  const res = await fetch(url, { headers: { Authorization: 'Bearer ' + _token } });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '요청 실패');
  return data;
}

async function authedPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + _token },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '요청 실패');
  return data;
}

async function authedDel(url) {
  const res = await fetch(url, {
    method: 'DELETE',
    headers: { Authorization: 'Bearer ' + _token },
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || '요청 실패');
  return data;
}

// ── 리포트 모달 ───────────────────────────────────────────────────────────
const R_SEC_KR  = { vocabulary:'어휘', grammar:'문법', reading:'독해', writing:'쓰기', phonics:'파닉스' };
function rSectionComment(key, pct) {
  const map = {
    vocabulary: pct >= 80 ? '어휘력이 전반적으로 풍부하게 갖추어져 있으며, 다양한 표현을 맥락에 맞게 활용하는 능력이 확인됩니다.' : pct >= 60 ? '기본 어휘는 양호하나, 고급 어휘 및 다의어 활용 영역의 추가 학습이 필요합니다.' : '어휘 기초부터 체계적으로 강화해 나가는 것이 필요합니다. 빈출 어휘 중심의 집중 학습을 권장합니다.',
    grammar:    pct >= 80 ? '문법 구조를 정확하게 이해하고 있으며, 시제와 수 일치 등 핵심 규칙을 안정적으로 적용하는 능력이 확인됩니다.' : pct >= 60 ? '기초 문법은 어느 정도 갖추어져 있으나, 시제·수 일치 등 세부 규칙의 정교화가 필요합니다.' : '기초 문법 규칙부터 체계적으로 복습하는 것이 필요합니다. 기본 문장 구조 반복 훈련을 권장합니다.',
    reading:    pct >= 80 ? '지문 이해력과 추론 능력이 우수합니다. 중심 내용 파악과 행간 읽기 능력이 고르게 발달해 있습니다.' : pct >= 60 ? '직접적인 내용 이해는 가능하나, 추론 및 중심 문장 파악 능력을 보강하는 연습이 필요합니다.' : '짧은 지문부터 단계적으로 독해 연습을 쌓아 나가는 것이 필요합니다.',
    writing:    pct >= 80 ? '문장 구조를 정확하게 구성할 수 있으며, 다양한 문형을 안정적으로 활용하는 능력이 확인됩니다.' : pct >= 60 ? '기본 문장 구성은 가능하나, 복잡한 구조의 문장 조합 능력을 높이는 연습이 필요합니다.' : '기본 어순과 문장 구조를 익히는 훈련이 필요합니다. 단순한 문형부터 반복 연습을 권장합니다.',
    phonics:    pct >= 80 ? '알파벳과 파닉스 규칙을 잘 익히고 있습니다. 소리와 철자의 대응 관계를 안정적으로 이해하고 있습니다.' : pct >= 60 ? '기본 파닉스 규칙은 갖추고 있으나, 이중자음·이중모음 등 심화 규칙의 추가 학습이 필요합니다.' : '알파벳 인식과 기초 파닉스 규칙부터 차근차근 학습해 나가는 것이 필요합니다.',
  };
  return map[key] || '';
}
// ── 레이더 차트 (test.html buildRadarSVG와 동일) ─────────────────────────
function buildRadarSVG(sections) {
  const entries = Object.entries(sections).filter(([, v]) => v.total > 0);
  const n = entries.length;
  if (n < 2) return null;
  const W = 300, H = 300, cx = W / 2, cy = H / 2, maxR = 85, labR = 115;
  const SKR = { vocabulary:'어휘', grammar:'문법', reading:'독해', writing:'쓰기', phonics:'파닉스' };
  function pt(i, r) {
    const a = (2 * Math.PI * i / n) - Math.PI / 2;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
  }
  function poly(r) {
    return Array.from({ length: n }, (_, i) => {
      const p = pt(i, r); return p.x.toFixed(1) + ',' + p.y.toFixed(1);
    }).join(' ');
  }
  const grids = [20, 40, 60, 80, 100].map(p => {
    const r = p / 100 * maxR;
    return '<polygon points="' + poly(r) + '" fill="' + (p === 20 ? '#F8FAFC' : 'none') +
           '" stroke="#E2E8F0" stroke-width="1"/>';
  }).join('');
  const axes = Array.from({ length: n }, (_, i) => {
    const p = pt(i, maxR);
    return '<line x1="' + cx + '" y1="' + cy + '" x2="' + p.x.toFixed(1) +
           '" y2="' + p.y.toFixed(1) + '" stroke="#CBD5E1" stroke-width="1"/>';
  }).join('');
  const gLabels = [20, 40, 60, 80, 100].map(p => {
    const r = p / 100 * maxR, gp = pt(0, r);
    return '<text x="' + (gp.x + 3).toFixed(1) + '" y="' + (gp.y - 1).toFixed(1) +
           '" font-size="7" fill="#94A3B8" font-family="sans-serif">' + p + '</text>';
  }).join('');
  const dataPts = entries.map(([, v], i) => {
    const r = Math.min(v.pct, 100) / 100 * maxR, p = pt(i, r);
    return p.x.toFixed(1) + ',' + p.y.toFixed(1);
  }).join(' ');
  const dots = entries.map(([, v], i) => {
    const r = Math.min(v.pct, 100) / 100 * maxR, p = pt(i, r);
    return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) +
           '" r="4" fill="#4F46E5" stroke="#fff" stroke-width="2"/>';
  }).join('');
  const labels = entries.map(([k, v], i) => {
    const lp = pt(i, labR);
    const ta = lp.x < cx - 5 ? 'end' : lp.x > cx + 5 ? 'start' : 'middle';
    const dy = ta === 'middle' ? (lp.y < cy ? -4 : 4) : 0;
    const lx = lp.x.toFixed(1), ny = lp.y + dy;
    return '<text x="' + lx + '" y="' + (ny - 7).toFixed(1) +
           '" text-anchor="' + ta + '" font-size="11" fill="#374151" font-weight="600"' +
           ' font-family="sans-serif" dominant-baseline="middle">' + (SKR[k] || k) + '</text>' +
           '<text x="' + lx + '" y="' + (ny + 8).toFixed(1) +
           '" text-anchor="' + ta + '" font-size="10" fill="#4F46E5" font-weight="700"' +
           ' font-family="sans-serif" dominant-baseline="middle">' + v.pct + '%</text>';
  }).join('');
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg"' +
    ' overflow="visible" style="max-width:260px;width:100%;height:auto">' +
    '<defs><linearGradient id="rfill" x1=".5" y1="0" x2=".5" y2="1">' +
    '<stop offset="0%" stop-color="#4F46E5" stop-opacity=".3"/>' +
    '<stop offset="100%" stop-color="#7C3AED" stop-opacity=".15"/>' +
    '</linearGradient></defs>' +
    grids + axes + gLabels +
    '<polygon points="' + dataPts + '" fill="url(#rfill)" stroke="#4F46E5"' +
    ' stroke-width="2.5" stroke-linejoin="round"/>' +
    dots + labels + '</svg>';
}

// ── 공통: 리포트 모달 열기 헬퍼 ──────────────────────────────────────────
async function _openReportModal(code, titleText, renderFn) {

  document.getElementById('report-meta').textContent = '불러오는 중…';
  document.getElementById('report-body').innerHTML = '';
  try {
    const data = await authedGet('/api/admin/assignments/' + code + '/report');
    const a = data.assessment || {};
    document.getElementById('report-meta').textContent =
      esc(data.studentName) + ' · 단계 ' + data.stage + ' ' + esc(data.stageName) +
      ' · ' + (data.completedAt ? new Date(data.completedAt).toLocaleString('ko-KR') : '—');

    document.getElementById('report-meta').textContent = '불러오기 실패';

/** 진단 리포트 HTML (① — 학생 화면 기준 통일, 경쟁사·STT 미포함) */
function renderDiagnosticHtml(data, a) {
  const cefr = (a.appropriate || {}).cefr || '';
  const filteredSecs = a.sections
    ? Object.entries(a.sections).filter(([, v]) => v.total > 0)
    : [];
  const radarSvg = a.sections ? buildRadarSVG(a.sections) : null;

  const secBars = filteredSecs.map(([k, v]) =>
    `<div class="r-sec-bar">
       <div class="r-sec-name">${R_SEC_KR[k]||k}</div>
       <div class="r-sec-track"><div class="r-sec-fill" style="width:${v.pct}%"></div></div>
       <div class="r-sec-val">${v.pct}%</div>
     </div>`
  ).join('');

  const secDetail = filteredSecs.map(([k, v]) => {
    const cmt = rSectionComment(k, v.pct);
    return cmt ? `<div class="sec-detail-item">
      <span class="sec-detail-name">${R_SEC_KR[k]||k}</span>
      <span class="sec-detail-pct">${v.pct}%</span>
      <div class="r-sec-comment">${cmt}</div>
    </div>` : '';
  }).filter(Boolean).join('');

  return `
    <div style="text-align:center;margin:8px 0 4px">
      <span class="ai-badge">🤖 AI 기반 진단 리포트</span>
    </div>
    <div class="res-hdr">
      <span>학생: <strong>${esc(data.studentName)}</strong></span>
      <span>단계: <strong>단계 ${data.stage} ${esc(data.stageName)}</strong></span>
      ${cefr ? `<span>CEFR: <strong>${esc(cefr)}</strong></span>` : ''}
      <span>시험일: <strong>${data.completedAt ? new Date(data.completedAt).toLocaleDateString('ko-KR') : '—'}</strong></span>
    </div>
    <div class="diag-grid">
      <div class="dg-left">
        <div class="r-score-box">
          <div class="r-score-num">${a.score ?? '—'}<span style="font-size:26px;color:#94A3B8;font-weight:400"> / ${a.total ?? 30}</span></div>
          <div class="r-score-sub">${a.scorePct ?? 0}%${cefr ? ' &nbsp;·&nbsp; CEFR ' + esc(cefr) : ''}</div>
        </div>
        <div class="result-level-box">
          <div class="rl-label">🎯 AI 추천 교재 레벨</div>
          <div class="rl-value">${a.appropriate && a.appropriate.recommended ? esc(a.appropriate.recommended) : '진단 결과 없음'}</div>
        </div>
        ${a.appropriate && a.appropriate.diagnosis ? `
        <div style="margin-top:8px">
          <div class="ai-section-title">🔍 AI 진단 결과</div>
          <div class="diag-text">${esc(a.appropriate.diagnosis)}</div>
        </div>` : ''}
        ${a.bonusEligible ? '<div style="margin-top:10px;text-align:center"><span class="bonus-badge">⭐ 상위 단계 보너스 대상</span></div>' : ''}
      </div>
      <div class="dg-right">
        <div class="ai-section-title">📊 AI 영역별 성취도</div>
        ${radarSvg ? `<div class="radar-wrap">${radarSvg}</div>` : ''}
        ${secBars || '<p style="font-size:13px;color:#94A3B8;">섹션 데이터 없음</p>'}
      </div>
    </div>
    ${a.overall ? `
    <div class="overall-box">
      <div class="overall-lbl">🧠 AI 종합 분석</div>
      <div>${esc(a.overall)}</div>
    </div>` : ''}
    ${secDetail ? `
    <div style="margin-top:10px">
      <div class="ai-section-title">🔎 AI 영역별 세부 평가</div>
      ${secDetail}
    </div>` : ''}
    ${(function() {
      const spk = a.speaking || {};
      if (spk.responseRate == null || typeof SpeakingUtils === 'undefined') return '';
      const fb = SpeakingUtils.buildSpeakingFeedback(spk);
      if (!fb) return '';
      const rate = spk.responseRate;
      const typR = spk.typingRate != null ? ' · 타이핑 ' + spk.typingRate + '%' : '';
      const items = [
        { label:'발음',  text: fb.pronunciation },
        { label:'유창성', text: fb.fluency },
        { label:'문법',  text: fb.grammar },
        { label:'표현',  text: fb.expression },
      ];
      return `<div style="margin-top:10px">
        <div class="ai-section-title">🎙 AI Speaking 피드백</div>
        <p class="spk-ref-line">참고 지표 — 음성 응답률 ${rate}%${typR}</p>
        ${items.map(it => `<div class="spk-fb-item"><span class="spk-fb-lbl">${it.label}</span><span class="spk-fb-txt">${esc(it.text)}</span></div>`).join('')}
      </div>`;
    })()}
    <button class="print-btn-diag" onclick="window.print()">🖨 결과지 출력 (A4)</button>`;
}

/** 테스트 상세 HTML (② — 영역 점수·STT·응답률, 원장 전용) */
function renderDetailHtml(data, a) {
  const secBars = a.sections
    ? Object.entries(a.sections)
        .filter(([, v]) => v.total > 0)
        .map(([k, v]) => {
          const cmt = rSectionComment(k, v.pct);
          return `<div class="r-sec-bar">
             <div class="r-sec-name">${R_SEC_KR[k]||k}</div>
             <div class="r-sec-track"><div class="r-sec-fill" style="width:${v.pct}%"></div></div>
             <div class="r-sec-val">${v.correct}/${v.total} (${v.pct}%)</div>
           </div>${cmt ? '<div class="r-sec-comment">' + cmt + '</div>' : ''}`;
        }).join('')
    : '';
  const spk      = a.speaking || {};
  const rate     = spk.responseRate != null ? spk.responseRate : null;
  const typRate  = spk.typingRate   != null ? spk.typingRate   : null;
  const stt      = spk.sttText ? spk.sttText : null;

  return `
    <div class="r-score-box">
      <div class="r-score-num">${a.score ?? '—'}<span style="font-size:26px;color:#94A3B8;font-weight:400"> / ${a.total ?? 30}</span></div>
      <div class="r-score-sub">${a.scorePct ?? 0}%</div>
    </div>
    <div class="r-sec-title">영역별 점수 상세</div>
    ${secBars || '<p style="font-size:13px;color:#94A3B8;">섹션 데이터 없음</p>'}
    <div class="r-section-divider"></div>
    <div class="r-sec-title">Listen &amp; Speak — 응답률</div>
    <div class="r-placeholder" style="text-align:center;padding:14px 16px;">
      ${rate != null
        ? `<div style="font-size:22px;font-weight:800;color:#4F46E5">${rate}%</div>
           <div style="font-size:12px;color:#64748B;margin-top:2px">음성 응답률</div>
           ${typRate != null ? `<div style="font-size:14px;font-weight:600;color:#64748B;margin-top:6px">${typRate}% 타이핑</div>` : ''}`
        : `<div style="color:#94A3B8">미응시 또는 데이터 없음</div>`}
    </div>
    <div class="r-placeholder" style="margin-top:8px;text-align:left;">
      <div class="r-ph-label">STT 발화 스크립트 (원장 전용)</div>
      ${stt
        ? `<pre style="font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-all;margin:0">${esc(stt)}</pre>`
        : `<span style="color:#94A3B8">— (음성 인식 데이터 없음)</span>`}
    </div>`;
}

function closeReportModal() {
  document.getElementById('report-modal').classList.remove('open');
}

// ── UI 유틸 ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let _toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
